script: |
  mkdir -p ~/apps/twenty-squared-api
  cd ~/apps/twenty-squared-api
  # We don't 'cat' the environment variables here anymore
  cat <<EOF > docker-compose.yml
  services:
    twenty-squared-api:
      image: ghcr.io/${{ github.repository }}:latest
      container_name: twenty-squared-api
      restart: unless-stopped
      env_file:
        - .env
      networks:
        - proxy-nw
  networks:
    proxy-nw:
      external: true
  EOF
  docker compose pull
  docker compose up -d
